name: Daily Programmatic SEO Build

on:
  schedule:
    # Triggers at exactly 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Adds a manual "Run Workflow" button in the GitHub Actions dashboard

permissions:
  contents: write  # Grants the workflow runner push-access to write your site files

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull down the latest commit state from your repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up a stable python environment on the virtual runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Run the enhanced build engine to compile index, blogs, RSS feed, and sitemap
    - name: Execute Programmatic Builder Engine
      run: python build.py

    # Step 4: Check for modifications, configure the git profile, and push clean updates
    - name: Check, Commit, and Deploy Production Assets
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Explicitly stage the programmatic components managed by build.py
        git add index.html blog/*.html sitemap.xml robots.txt feed.xml llms.txt
        
        # Safely commit and push only if actual layout file changes are caught
        if git diff-index --quiet HEAD --; then
          echo "No programmatic changes or cross-linking adjustments caught today."
        else
          git commit -m "automation loop: optimized 2026 conversion network build refresh with internal cross-linking matrix"
          git push
        fi
